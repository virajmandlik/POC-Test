# ============================================================
# F4F POC — Docker Compose
#
# Services:
#   mongo  — MongoDB 7 (job system + audit logs)
#   api    — FastAPI backend (port 8000)
#   ui     — Streamlit frontend (port 8501)
#
# Usage:
#   docker compose up -d            # start all
#   docker compose up -d --build    # rebuild + start
#   docker compose logs -f api ui   # tail logs
#   docker compose down             # stop all
#   docker compose down -v          # stop + remove volumes
# ============================================================

services:

  # ── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: f4f-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI Backend ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f4f-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=f4f_poc
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - uploads_data:/app/uploads
      - output_data:/app/output
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Streamlit Frontend ───────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f4f-ui
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    command: ["streamlit", "run", "ui/app.py", "--server.port", "8501"]

volumes:
  mongo_data:
  uploads_data:
  output_data:
